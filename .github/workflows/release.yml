name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão do release no formato major.minor.patch"
        required: true
        type: string
      prerelease:
        description: "Publicar como pré-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $prerelease = "${{ inputs.prerelease }}"
          }
          else {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
            $prerelease = "false"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "A versão deve estar no formato major.minor.patch."
          }

          @(
            "version=$version"
            "assembly_version=$version.0"
            "tag=v$version"
            "prerelease=$prerelease"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stamp extension version
        shell: pwsh
        run: |
          .\scripts\Set-VsixVersion.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -AssemblyVersion "${{ steps.version.outputs.assembly_version }}"

      - name: Build VSIX
        shell: pwsh
        run: |
          Remove-Item -Path CodexVsix\CodexVsix.vsix -ErrorAction SilentlyContinue
          Remove-Item -Path CodexVsix\obj\Release\net472\extension.vsixmanifest -ErrorAction SilentlyContinue

          msbuild CodexVsix\CodexVsix.csproj `
            /restore `
            /t:Rebuild `
            /m `
            /p:Configuration=Release `
            /p:BuildVsixPackage=true

      - name: Verify VSIX output
        id: verify
        shell: pwsh
        run: |
          $vsix = Resolve-Path CodexVsix\CodexVsix.vsix -ErrorAction SilentlyContinue
          if (-not $vsix) {
            throw "O arquivo CodexVsix\\CodexVsix.vsix não foi gerado."
          }

          $extractPath = Join-Path $env:RUNNER_TEMP "codex-vsix-verify"
          $zipPath = Join-Path $env:RUNNER_TEMP "codex-vsix-verify.zip"
          Remove-Item -Path $extractPath -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $zipPath -Force -ErrorAction SilentlyContinue
          Copy-Item -Path $vsix.Path -Destination $zipPath -Force
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $manifestPath = Join-Path $extractPath "extension.vsixmanifest"
          if (-not (Test-Path $manifestPath)) {
            throw "O extension.vsixmanifest não foi encontrado dentro do VSIX."
          }

          [xml]$manifest = Get-Content -LiteralPath $manifestPath -Raw -Encoding UTF8
          $ns = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
          $ns.AddNamespace("vsix", "http://schemas.microsoft.com/developer/vsx-schema/2011")
          $identity = $manifest.SelectSingleNode("/vsix:PackageManifest/vsix:Metadata/vsix:Identity", $ns)
          if (-not $identity) {
            throw "Não foi possível localizar o Identity dentro do extension.vsixmanifest empacotado."
          }

          $manifestVersion = $identity.Version
          if ($manifestVersion -ne "${{ steps.version.outputs.version }}") {
            throw "A versão dentro do VSIX ($manifestVersion) difere da versão esperada (${{ steps.version.outputs.version }})."
          }

          "vsix_path=$($vsix.Path -replace '\\', '/')" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Collect artifact
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $target = Join-Path (Resolve-Path artifacts) ("CodexVsix-" + "${{ steps.version.outputs.version }}" + ".vsix")
          Copy-Item -Path "${{ steps.verify.outputs.vsix_path }}" -Destination $target -Force
          "path=$($target -replace '\\', '/')" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexVsix-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.path }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Codex for Visual Studio 2026 v${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.path }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
